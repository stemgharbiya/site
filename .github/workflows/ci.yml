name: CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          npm run lint || (echo "❌ ESLint failed! Run 'npm run lint:fix' locally to fix issues and rerun 'npm run lint'." && exit 1)

  prettier:
    runs-on: ubuntu-latest
    needs: eslint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: |
          npm run format:check || (echo "❌ Prettier check failed! Run 'npm run format' locally to fix formatting." && exit 1)

  build:
    runs-on: ubuntu-latest
    needs: [eslint, prettier]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Astro cache
        id: astro-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: node_modules/.astro
          key: astro-cache-${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            astro-cache-${{ runner.os }}-node-

      - name: Build
        run: |
          npm run build || (echo "❌ Build failed! Run 'npm run build' locally and fix errors." && exit 1)

      - name: Save Astro cache
        if: steps.astro-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: node_modules/.astro
          key: astro-cache-${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
